<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Mohil Patel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <style>
      .not-found {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 18px;
        padding: 28px;
      }
      .not-found__code {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(64px, 12vw, 120px);
        line-height: 1;
        letter-spacing: -3px;
        color: var(--color-accent);
      }
      .not-found__title {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: clamp(20px, 3vw, 28px);
        margin: 0;
      }
      .not-found__desc {
        color: var(--color-text-muted);
        max-width: 420px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="not-found">
      <div class="not-found__code">404</div>
      <h1 class="not-found__title">Page not found</h1>
      <p class="not-found__desc">The page you're looking for doesn't exist or has moved.</p>
      <a href="/" class="btn btn-primary">Back to home</a>
    </div>
  </body>
</html>
